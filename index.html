<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural City Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <h1>City Map Workshop</h1>
      </div>
      <button id="generateButton" class="generate-button" type="submit" form="generatorForm">Generate City</button>
    </header>

    <main class="layout">
      <section class="panel controls-panel">
        <form id="generatorForm" class="controls-grid">
          <label>
            <span class="field-title">Seed <button class="help-dot" type="button" data-tooltip="Controls the deterministic random stream. Reusing the same seed with the same settings reproduces the exact same Voronoi map." aria-label="Seed help">?</button></span>
            <input id="seed" name="seed" type="text" value="harbor-01">
          </label>

          <label>
            <span class="field-title">Point Count <button class="help-dot" type="button" data-tooltip="Sets how many pseudo-random sites are scattered before the Voronoi pass. Higher values create smaller cells and denser edge networks." aria-label="Point count help">?</button></span>
            <input id="pointCount" name="pointCount" type="range" min="50" max="1200" value="1000">
            <output for="pointCount" id="pointCountValue">1000</output>
          </label>

          <label>
            <span class="field-title">Rivers <button class="help-dot" type="button" data-tooltip="Choose how many rivers to trace. The default is the number of land sides minus one, and island maps with water on all four sides cannot have rivers." aria-label="River count help">?</button></span>
            <input id="riverCount" name="riverCount" type="range" min="0" max="4" value="1">
            <output for="riverCount" id="riverCountValue">1</output>
          </label>

          <fieldset class="water-sides">
            <legend>Water Sides <button class="help-dot" type="button" data-tooltip="Choose which outer borders can flood inward. No sides gives an inland city, one or two sides yields a coastal city, and all four sides tends toward an island core." aria-label="Water sides help">?</button></legend>
            <label><input type="checkbox" name="waterSides" value="north">North</label>
            <label><input type="checkbox" name="waterSides" value="east">East</label>
            <label><input type="checkbox" name="waterSides" value="south" checked>South</label>
            <label><input type="checkbox" name="waterSides" value="west" checked>West</label>
          </fieldset>
        </form>

        <section class="steps-box">
          <section class="replay-panel">
            <div class="replay-header">
              <h3>Replay</h3>
              <button id="playReplayButton" class="secondary-button" type="button">Play</button>
            </div>
            <div class="replay-controls">
              <button id="prevReplayButton" class="secondary-button" type="button">Prev</button>
              <label class="replay-slider">
                <input id="replaySlider" type="range" min="0" max="0" value="0">
              </label>
              <button id="nextReplayButton" class="secondary-button" type="button">Next</button>
            </div>
          </section>
          <div class="steps-header">
            <h2>Generation Steps</h2>
            <span id="statusBadge" class="status-badge">Idle</span>
          </div>
          <ol id="stepsList" class="steps-list"></ol>
        </section>
      </section>

      <section class="panel canvas-panel">
        <div class="canvas-meta">
          <h2>Rendered Map</h2>
          <p id="mapSummary">No map generated yet.</p>
        </div>
        <div class="map-controls" aria-label="Map zoom controls">
          <button id="zoomOutButton" class="secondary-button" type="button" aria-label="Zoom out">-</button>
          <button id="zoomInButton" class="secondary-button" type="button" aria-label="Zoom in">+</button>
          <button id="resetViewButton" class="secondary-button" type="button">Reset View</button>
        </div>
        <div id="mapViewport" class="map-viewport">
          <svg id="cityMap" viewBox="0 0 768 768" aria-label="Generated city map" role="img"></svg>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
