<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural City Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
       <main class="layout">
      <section class="panel">
        <form id="generatorForm" class="controls-grid">
          <label>
            <span class="field-title">
              Seed <button class="help-dot" type="button" data-tooltip="Controls the deterministic random stream. Reusing the same seed with the same settings reproduces the exact same Voronoi map." aria-label="Seed help">?</button>
            </span>
            <div class="seed-row">
              <input id="seed" name="seed" type="text" value="o95x2w30">
              <button id="randomSeedButton" class="secondary-button seed-button" type="button">Random</button>
              <button id="bestSeedButton" class="secondary-button seed-button" type="button">Best of 50</button>
            </div>
            <span id="backgroundTaskStatus" class="task-status" aria-live="polite"></span>
          </label>

          <section class="steps-box">
            <div class="steps-header">
              <h2>Generation Steps</h2>
              <span id="statusBadge" class="status-badge">Idle</span>
            </div>
            <section id="controlHelpBlock" class="control-help-block" aria-live="polite">
              <h3>Control Help</h3>
              <p id="controlHelpText">Click a control help button to see its purpose and effect.</p>
            </section>
            <ol id="stepsList" class="steps-list">
              <li data-step-index="0">
                <button class="step-select" type="button">1.1 Scatter pseudo-random points</button>
                <div class="step-controls">
                  <fieldset class="algorithm-choice">
                    <legend>Algorithm <button class="control-help-trigger" type="button" data-help-key="scatterAlgorithm" aria-label="Scatter algorithm help">?</button></legend>
                    <label><input type="radio" name="scatterAlgorithm" value="random_scattering" checked>Random scattering</label>
                    <label><input type="radio" name="scatterAlgorithm" value="poisson_disk">Poisson disk distribution</label>
                    <label><input type="radio" name="scatterAlgorithm" value="square_grid">Square grid</label>
                  </fieldset>
                  <label>
                    <span class="field-title">Point Count <button class="control-help-trigger" type="button" data-help-key="pointCount" aria-label="Point Count help">?</button></span>
                    <input id="pointCount" name="pointCount" type="range" min="50" max="1200" value="500">
                    <output for="pointCount" id="pointCountValue">500</output>
                  </label>
                  <label>
                    <span class="field-title">Scatter Padding Ratio <button class="control-help-trigger" type="button" data-help-key="scatterPaddingRatio" aria-label="Scatter Padding Ratio help">?</button></span>
                    <input id="scatterPaddingRatio" name="scatterPaddingRatio" type="range" min="0" max="0.1" step="0.005" value="0.01">
                    <output for="scatterPaddingRatio" id="scatterPaddingRatioValue">0.01</output>
                  </label>
                  <section id="poissonControlsPanel" class="algorithm-secondary-controls">
                    <label>
                      <span class="field-title">Poisson Spacing Ratio <button class="control-help-trigger" type="button" data-help-key="poissonSpacingRatio" aria-label="Poisson spacing ratio help">?</button></span>
                      <input id="poissonSpacingRatio" name="poissonSpacingRatio" type="range" min="0.4" max="2.4" step="0.05" value="1.15">
                      <output for="poissonSpacingRatio" id="poissonSpacingRatioValue">1.15</output>
                    </label>
                    <label>
                      <span class="field-title">Poisson Max Attempts <button class="control-help-trigger" type="button" data-help-key="poissonMaxAttempts" aria-label="Poisson max attempts help">?</button></span>
                      <input id="poissonMaxAttempts" name="poissonMaxAttempts" type="range" min="4" max="80" step="1" value="30">
                      <output for="poissonMaxAttempts" id="poissonMaxAttemptsValue">30</output>
                    </label>
                    <label>
                      <span class="field-title">Poisson Padding Ratio <button class="control-help-trigger" type="button" data-help-key="poissonPaddingRatio" aria-label="Poisson padding ratio help">?</button></span>
                      <input id="poissonPaddingRatio" name="poissonPaddingRatio" type="range" min="0" max="0.15" step="0.005" value="0.01">
                      <output for="poissonPaddingRatio" id="poissonPaddingRatioValue">0.01</output>
                    </label>
                  </section>
                </div>
              </li>
              <li data-step-index="1">
                <button class="step-select" type="button">1.2 Compute Voronoi cells and edges</button>
              </li>
              <li data-step-index="2">
                <button class="step-select" type="button">1.3 Apply one Lloyd relaxation pass</button>
                <div class="step-controls">
                  <label>
                    <span class="field-title">Relax Padding Ratio <button class="control-help-trigger" type="button" data-help-key="relaxPaddingRatio" aria-label="Relax Padding Ratio help">?</button></span>
                    <input id="relaxPaddingRatio" name="relaxPaddingRatio" type="range" min="0" max="0.15" step="0.005" value="0.04">
                    <output for="relaxPaddingRatio" id="relaxPaddingRatioValue">0.04</output>
                  </label>
                </div>
              </li>
              <li data-step-index="3">
                <button class="step-select" type="button">1.4 Collapse short edges</button>
              </li>
              <li data-step-index="4">
                <button class="step-select" type="button">1.5 Select and paint sea areas</button>
                <div class="step-controls">
                  <fieldset class="water-sides">
                    <legend>Water Sides <button class="control-help-trigger" type="button" data-help-key="waterSides" aria-label="Water Sides help">?</button></legend>
                    <label><input type="checkbox" name="waterSides" value="north">North</label>
                    <label><input type="checkbox" name="waterSides" value="east">East</label>
                    <label><input type="checkbox" name="waterSides" value="south" checked>South</label>
                    <label><input type="checkbox" name="waterSides" value="west" checked>West</label>
                  </fieldset>
                  <label>
                    <span class="field-title">Water Reach Ratio <button class="control-help-trigger" type="button" data-help-key="waterReachRatio" aria-label="Water Reach Ratio help">?</button></span>
                    <input id="waterReachRatio" name="waterReachRatio" type="range" min="0" max="0.5" step="0.01" value="0.2">
                    <output for="waterReachRatio" id="waterReachRatioValue">0.2</output>
                  </label>
                  <label>
                    <span class="field-title">Water Expansion Base <button class="control-help-trigger" type="button" data-help-key="waterExpansionBase" aria-label="Water Expansion Base help">?</button></span>
                    <input id="waterExpansionBase" name="waterExpansionBase" type="range" min="0" max="1" step="0.01" value="0.14">
                    <output for="waterExpansionBase" id="waterExpansionBaseValue">0.14</output>
                  </label>
                  <label>
                    <span class="field-title">Water Edge Weight <button class="control-help-trigger" type="button" data-help-key="waterExpansionEdgeWeight" aria-label="Water Edge Weight help">?</button></span>
                    <input id="waterExpansionEdgeWeight" name="waterExpansionEdgeWeight" type="range" min="0" max="1" step="0.01" value="0.52">
                    <output for="waterExpansionEdgeWeight" id="waterExpansionEdgeWeightValue">0.52</output>
                  </label>
                  <label>
                    <span class="field-title">Water Pressure Range <button class="control-help-trigger" type="button" data-help-key="waterPressureRangeRatio" aria-label="Water Pressure Range help">?</button></span>
                    <input id="waterPressureRangeRatio" name="waterPressureRangeRatio" type="range" min="0.1" max="1" step="0.01" value="0.42">
                    <output for="waterPressureRangeRatio" id="waterPressureRangeRatioValue">0.42</output>
                  </label>
                  <label>
                    <span class="field-title">Water Center Bias Radius <button class="control-help-trigger" type="button" data-help-key="waterCenterBiasRadiusRatio" aria-label="Water Center Bias Radius help">?</button></span>
                    <input id="waterCenterBiasRadiusRatio" name="waterCenterBiasRadiusRatio" type="range" min="0" max="1" step="0.01" value="0.68">
                    <output for="waterCenterBiasRadiusRatio" id="waterCenterBiasRadiusRatioValue">0.68</output>
                  </label>
                </div>
              </li>
              <li data-step-index="5">
                <button class="step-select" type="button">1.6 Flag inland hill cells</button>
                <div class="step-controls">
                  <label>
                    <span class="field-title">Hills <button class="control-help-trigger" type="button" data-help-key="hillCount" aria-label="Hills help">?</button></span>
                    <input id="hillCount" name="hillCount" type="range" min="0" max="40" value="9">
                    <output for="hillCount" id="hillCountValue">9</output>
                  </label>
                  <label>
                    <span class="field-title">Hill Sea Distance <button class="control-help-trigger" type="button" data-help-key="hillSeaDistance" aria-label="Hill Sea Distance help">?</button></span>
                    <input id="hillSeaDistance" name="hillSeaDistance" type="range" min="0" max="12" step="1" value="4">
                    <output for="hillSeaDistance" id="hillSeaDistanceValue">4</output>
                  </label>
                  <label>
                    <span class="field-title">Hillside Radius <button class="control-help-trigger" type="button" data-help-key="hillsideRadius" aria-label="Hillside Radius help">?</button></span>
                    <input id="hillsideRadius" name="hillsideRadius" type="range" min="0" max="6" step="1" value="2">
                    <output for="hillsideRadius" id="hillsideRadiusValue">1</output>
                  </label>
                </div>
              </li>
              <li data-step-index="6">
                <button class="step-select" type="button">1.7 Trace the first river</button>
                <div class="step-controls">
                  <label>
                    <span class="field-title">River Turn Angle <button class="control-help-trigger" type="button" data-help-key="riverTurnAngle" aria-label="River Turn Angle help">?</button></span>
                    <input id="riverTurnAngle" name="riverTurnAngle" type="range" min="0" max="120" value="90">
                    <output for="riverTurnAngle" id="riverTurnAngleValue">90</output>
                  </label>
                  <label>
                    <span class="field-title">Primary River Width <button class="control-help-trigger" type="button" data-help-key="primaryRiverWidth" aria-label="Primary River Width help">?</button></span>
                    <input id="primaryRiverWidth" name="primaryRiverWidth" type="range" min="6" max="36" step="1.5" value="18">
                    <output for="primaryRiverWidth" id="primaryRiverWidthValue">18</output>
                  </label>
                </div>
              </li>
              <li data-step-index="7">
                <button class="step-select" type="button">1.8 Trace the first tributary</button>
                <div class="step-controls">
                  <label>
                    <span class="field-title">Tributary Source Distance <button class="control-help-trigger" type="button" data-help-key="tributarySourceRiverDistance" aria-label="Tributary Source Distance help">?</button></span>
                    <input id="tributarySourceRiverDistance" name="tributarySourceRiverDistance" type="range" min="0" max="20" step="1" value="6">
                    <output for="tributarySourceRiverDistance" id="tributarySourceRiverDistanceValue">6</output>
                  </label>
                  <label>
                    <span class="field-title">Tributary Merge Distance <button class="control-help-trigger" type="button" data-help-key="tributaryMergeSeaDistance" aria-label="Tributary Merge Distance help">?</button></span>
                    <input id="tributaryMergeSeaDistance" name="tributaryMergeSeaDistance" type="range" min="0" max="20" step="1" value="5">
                    <output for="tributaryMergeSeaDistance" id="tributaryMergeSeaDistanceValue">5</output>
                  </label>
                  <label>
                    <span class="field-title">Tributary Width Ratio <button class="control-help-trigger" type="button" data-help-key="tributaryWidthRatio" aria-label="Tributary Width Ratio help">?</button></span>
                    <input id="tributaryWidthRatio" name="tributaryWidthRatio" type="range" min="0.3" max="1" step="0.02" value="0.72">
                    <output for="tributaryWidthRatio" id="tributaryWidthRatioValue">0.72</output>
                  </label>
                  <label>
                    <span class="field-title">Merge Width Gain <button class="control-help-trigger" type="button" data-help-key="primaryMergeWidthGain" aria-label="Merge Width Gain help">?</button></span>
                    <input id="primaryMergeWidthGain" name="primaryMergeWidthGain" type="range" min="0" max="12" step="0.3" value="3.6">
                    <output for="primaryMergeWidthGain" id="primaryMergeWidthGainValue">3.6</output>
                  </label>
                </div>
              </li>
              <li data-step-index="8">
                <button class="step-select" type="button">1.9 Convert to lot geometry</button>
              </li>
              <li data-step-index="9">
                <button class="step-select" type="button">1.10 Add rivers to lot geometry</button>
              </li>
              <li data-step-index="10">
                <button class="step-select" type="button">1.11 Tessellate lot geometry</button>
                <div class="step-controls">
                  <fieldset class="algorithm-choice">
                    <legend>Algorithm <button class="control-help-trigger" type="button" data-help-key="tessellateAlgorithm" aria-label="Tessellation algorithm help">?</button></legend>
                    <label><input type="radio" name="tessellateAlgorithm" value="straight_bisection" checked>Straight bisection</label>
                    <label><input type="radio" name="tessellateAlgorithm" value="curved_bisection">Curved bisection</label>
                    <label><input type="radio" name="tessellateAlgorithm" value="poisson_voronoi">Poisson Voronoi</label>
                  </fieldset>
                  <section id="curvedBisectionControlsPanel" class="algorithm-secondary-controls" hidden>
                    <label>
                      <span class="field-title">Normal Amplitude <button class="control-help-trigger" type="button" data-help-key="curvedBisectionAmplitude" aria-label="Normal amplitude help">?</button></span>
                      <input id="curvedBisectionAmplitude" name="curvedBisectionAmplitude" type="range" min="0.1" max="1.4" step="0.05" value="0.35">
                      <output for="curvedBisectionAmplitude" id="curvedBisectionAmplitudeValue">0.35</output>
                    </label>
                  </section>
                </div>
              </li>
            </ol>
          </section>
        </form>
      </section>

      <section class="panel canvas-panel">
        <div class="map-summary" aria-label="Map generation summary">
          <div class="map-summary-item">
            <span class="map-summary-label">Sea cells</span>
            <span id="seaCellCount" class="map-summary-value">0</span>
          </div>
          <div class="map-summary-item">
            <span class="map-summary-label">Land cells</span>
            <span id="landCellCount" class="map-summary-value">0</span>
          </div>
          <div class="map-summary-item">
            <span class="map-summary-label">Total time</span>
            <span id="generationTimeValue" class="map-summary-value">--</span>
          </div>
          <div id="primaryRiverSummary" class="map-summary-item map-summary-item-river">
            <span id="primaryRiverLabel" class="map-summary-label">Primary river</span>
            <span id="primaryRiverLength" class="map-summary-value">--</span>
          </div>
          <div id="tributaryRiverSummary" class="map-summary-item map-summary-item-river">
            <span id="tributaryRiverLabel" class="map-summary-label">Tributary</span>
            <span id="tributaryRiverLength" class="map-summary-value">--</span>
          </div>
        </div>
        <div class="map-shell">
          <div id="mapViewport" class="map-viewport">
            <svg id="cityMap" viewBox="0 0 3000 3000" aria-label="Generated city map" role="img"></svg>
          </div>
          <aside class="cell-panel" aria-live="polite">
            <h3>Hovered Feature</h3>
            <div id="hoveredCellData" class="cell-data empty">Hover a lot or river to inspect its data.</div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
