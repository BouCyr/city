<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coastline Process</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="tutorial-shell">
    <section class="tutorial-toolbar panel">
      <label class="tutorial-control">
        <span class="field-title">Dataset</span>
        <select id="datasetSelect">
          <option value="threeCellIsland">Three-cell island</option>
          <option value="northSouthCoastline">North-south coastline</option>
          <option value="snakingRiverLand">Snaking river land</option>
        </select>
      </label>
      <div class="tutorial-navigation">
        <button id="previousStepButton" class="secondary-button" type="button">Prev</button>
        <output id="stepCounter" class="tutorial-counter">1 / 1</output>
        <button id="nextStepButton" class="secondary-button" type="button">Next</button>
      </div>
      <a class="secondary-button tutorial-home-link" href="./index.html">Main map</a>
    </section>

    <section class="tutorial-layout">
      <section class="tutorial-visual-panel panel">
        <svg id="coastlineSvg" class="tutorial-svg coastline-svg" role="img" aria-label="Coastline process diagram"></svg>
      </section>
      <aside class="tutorial-text-panel panel">
        <p id="datasetKicker" class="tutorial-kicker">Three-cell island</p>
        <h1 id="stepTitle">Coastline process</h1>
        <p id="stepBody">Choose a dataset to inspect the smoothing process.</p>
      </aside>
    </section>
  </main>
  <script type="module" src="./src/coastline.js"></script>
</body>
</html>
